  <g>
    <rect x="150" y="1120" width="980" height="66" rx="18" fill="#f6f8fa" stroke="#c9d1d9" stroke-width="1.5"/>
    <text class="card-title" x="174" y="1154" fill="#57606a">Truth boundary</text>
  <text class="card-line" x="174" y="1182">Technical invariant: Markdown items are authoritative; index.db, vectors, runtime, review, and resources are derived</text>
