  <text class="card-title" x="92" y="660" fill="#bc6c00">Read Models</text>
  <text class="mono-small" x="92" y="685" fill="#bc6c00">L4</text>
  <rect x="322" y="639" width="282" height="62" rx="14" fill="#ffffff" stroke="#efb770" stroke-width="1.1"/>
