<svg xmlns="http://www.w3.org/2000/svg" width="1580" height="820" viewBox="0 0 1580 820" role="img" aria-labelledby="title desc" style="max-width:100%;height:auto;">
  <title id="title">Product Architecture: From Collaboration Pain To Trusted Context</title>
  <desc id="desc">Product Architecture: From Collaboration Pain To Trusted Context</desc>
  <defs>

