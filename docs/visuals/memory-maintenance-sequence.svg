  <text class="title" x="70" y="76">Maintenance Sequence Chain</text>
  <text class="subtitle" x="72" y="105">先把证据变成可信 MemoryItem，再投影索引和运行账本；召回只能读取这个交接面，不能直接读原始噪声。</text>
  <text class="small" x="72" y="134">solid = current implemented path</text>
  <text class="small" x="330" y="134">dashed / review = gated side path</text>
