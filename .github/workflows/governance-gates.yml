name: governance-gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test runtime
        run: pip install -e ".[dev]"
      - name: Verify realtime credential and tenant boundaries
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: >-
          python -m pytest
          tests/unit/test_realtime_auth.py
          tests/unit/test_web_auth.py
          tests/unit/test_web_sse_tenant_scope.py
          tests/unit/test_web_tenant_isolation.py
          tests/conformance/test_public_hygiene.py
          -q

  benchmark-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test runtime
        run: pip install -e ".[dev]"
      - name: Verify fail-closed external benchmark contracts
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: python -m pytest tests/unit/test_external_memory_benchmark.py -q

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install static test runtime
        run: pip install -e ".[dev]"
      - name: Verify static container contract
        run: python -m pytest tests/conformance/test_docker_contract.py -q
      - name: Build and exercise the default container
        run: ./scripts/docker-smoke.sh

  recall-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test runtime
        run: pip install -e ".[dev]"
      - name: Replay recall corpus and safety contracts
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: >-
          python -m pytest
          tests/unit/test_recall_quality_corpus.py
          tests/system/test_recall_quality_replay.py
          tests/system/test_dual_route_recall_matrix.py
          -q
      - name: Generate fresh real-hook recall evidence
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: >-
          python scripts/run-hook-recall-evidence.py
          --output .artifacts/hook-recall-evidence.json
      - name: Verify fresh real-hook recall evidence
        if: always()
        run: >-
          python scripts/check-hook-recall-evidence.py
          .artifacts/hook-recall-evidence.json
          --require-clean
      - name: Upload real-hook recall evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook-recall-evidence
          path: .artifacts/hook-recall-evidence.json
          if-no-files-found: error
      - name: Verify committed six-layer recall report
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: ./scripts/check-recall-quality.py

  adapter-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test runtime
        run: pip install -e ".[dev]"
      - name: Verify adapter lifecycle and core isolation contracts
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: >-
          python -m pytest
          tests/unit/test_adapter_manifests.py
          tests/unit/test_adapter_lifecycle_records.py
          tests/unit/test_adapter_release_controls.py
          tests/unit/test_adapter_governance_report.py
          tests/system/test_adapter_lifecycle_contract.py
          tests/system/test_adapter_core_isolation.py
          -q
      - name: Verify committed adapter governance report
        run: ./scripts/generate-adapter-governance.py --check
