name: python-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Provenance tests verify frozen candidate commits that precede the
          # documentation-only PR head, so the default shallow checkout is
          # insufficient.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy agent_brain web benchmarks
        continue-on-error: true
      - name: Unit tests
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: python -m pytest tests/unit -q --cov=agent_brain --cov=web --cov-report=term-missing
      - name: Conformance tests (CLI + MCP)
        env:
          MEMORY_HUB_TEST_EMBEDDING: "1"
        run: python -m pytest tests/conformance/test_cli_e2e.py tests/conformance/test_mcp_e2e.py -q
