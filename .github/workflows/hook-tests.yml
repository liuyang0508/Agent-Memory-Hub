name: Hook unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep python3
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Run hook unit tests
        run: ./agent_runtime_kit/hooks/test-hook.sh

      - name: Run schema tests
        run: ./tests/schema-tenant-id-test.sh

      - name: Run quickstart benchmark (60s budget)
        run: ./benchmarks/quickstart-60s.sh
